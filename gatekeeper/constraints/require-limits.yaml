apiVersion: constraints.gatekeeper.sh/v1beta1
kind: RequireLimits
metadata:
  name: require-limits
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  enforcementAction: deny
  match:
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
    excludedNamespaces:
    - external-secrets
    - gatekeeper-system
    - argocd
    - kube-system
    - monitoring
    - argo-rollouts
