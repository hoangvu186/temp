# Test 1: image :latest
apiVersion: v1
kind: Pod
metadata:
  name: test-latest
  namespace: demo
spec:
  containers:
  - name: test
    image: nginx:latest
---
# Test 2: thi?u limits
apiVersion: v1
kind: Pod
metadata:
  name: test-nolimits
  namespace: demo
spec:
  containers:
  - name: test
    image: nginx:1.25
---
# Test 3: runAsUser 0
apiVersion: v1
kind: Pod
metadata:
  name: test-root
  namespace: demo
spec:
  securityContext:
    runAsUser: 0
  containers:
  - name: test
    image: nginx:1.25
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
---
# Test 4: hostNetwork true
apiVersion: v1
kind: Pod
metadata:
  name: test-hostnet
  namespace: demo
spec:
  hostNetwork: true
  containers:
  - name: test
    image: nginx:1.25
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
---
# Test 5: pod hop le
apiVersion: v1
kind: Pod
metadata:
  name: test-valid
  namespace: demo
spec:
  containers:
  - name: test
    image: nginx:1.25
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
    securityContext:
      runAsUser: 1000
