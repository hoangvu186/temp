apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-password
  namespace: demo
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: db-password
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: demo/db-password
      property: password
